<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteManager</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        textarea { width: 100%; height: 180px; margin: 10px 0; padding: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h3>NoteManager</h3>
    <input type="text" id="fileName" placeholder="notiz.txt" style="width: 100%; padding: 10px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc;">
    <textarea id="noteContent" placeholder="Text wird hier geladen oder manuell eingefügt..."></textarea>
    <button onclick="saveLocalFile()">Datei auf Gerät speichern</button>

    <script>
        // Brücke für das MCP-System der App
        window.agentTools = {
            save_note: async function(filename, content) {
                document.getElementById('fileName').value = filename;
                document.getElementById('noteContent').value = content;
                return JSON.stringify({ status: "success", message: "Text in Web-UI geladen. Bitte klicke auf Speichern." });
            }
        };

        async function saveLocalFile() {
            const filename = document.getElementById('fileName').value || 'notiz.txt';
            const content = document.getElementById('noteContent').value;
            
            if (!content) { alert('Kein Inhalt zum Speichern vorhanden!'); return; }

            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: filename.endsWith('.txt') ? filename : filename + '.txt',
                    types: [{ description: 'Textdatei', accept: { 'text/plain': ['.txt'] } }]
                });
                const writable = await handle.createWritable();
                await writable.write(content);
                await writable.close();
                alert('Erfolgreich im System-Ordner gespeichert!');
            } catch (err) {
                if (err.name !== 'AbortError') alert('Fehler: ' + err.message);
            }
        }
    </script>
</body>
</html>
