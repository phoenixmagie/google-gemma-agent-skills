<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteManager UI</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; color: #333; }
        textarea { width: 100%; height: 200px; margin-bottom: 15px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h3>NoteManager – Text speichern</h3>
    <textarea id="noteContent" placeholder="Füge hier den Text ein, den Gemma generiert hat..."></textarea>
    <button onclick="saveNote()">Datei speichern</button>

    <script>
        async function saveNote() {
            const content = document.getElementById('noteContent').value;
            if (!content) {
                alert('Bitte trage zuerst einen Text ein!');
                return;
            }

            try {
                // Der native Android-Speicherdialog (wird nur durch echten Klick erlaubt)
                const handle = await window.showSaveFilePicker({
                    suggestedName: 'notiz.txt',
                    types: [{
                        description: 'Textdatei',
                        accept: { 'text/plain': ['.txt'] }
                    }]
                });
                
                const writable = await handle.createWritable();
                await writable.write(content);
                await writable.close();
                alert('Datei erfolgreich gespeichert!');
            } catch (err) {
                if (err.name !== 'AbortError') {
                    alert('Fehler beim Speichern: ' + err.message);
                }
            }
        }
    </script>
</body>
</html>
